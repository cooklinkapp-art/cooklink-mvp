<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LinkToCart — De la recette à la liste de courses</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #f8fafc; /* Fond gris ultra clair très moderne */
      color: #0f172a; /* Texte presque noir */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    main {
      text-align: center;
      width: 100%;
      max-width: 500px;
      background: #ffffff;
      padding: 3rem 2rem;
      border-radius: 1.5rem;
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.08); /* Ombre douce façon carte */
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1rem;
      color: #64748b;
      font-weight: 400;
      margin-bottom: 2.5rem;
      line-height: 1.5;
    }

    .recette-input {
      width: 100%;
      min-height: 140px;
      margin-bottom: 1.5rem;
      padding: 1rem;
      font-family: inherit;
      font-size: 0.95rem;
      border: 2px solid transparent;
      border-radius: 0.75rem;
      resize: vertical;
      background: #f1f5f9; /* Fond gris léger pour l'input */
      color: #334155;
      transition: all 0.2s ease;
    }

    .recette-input::placeholder {
      color: #94a3b8;
    }

    .recette-input:focus {
      outline: none;
      background: #ffffff;
      border-color: #10b981; /* Vert action */
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }

    .cta-wrap {
      margin-bottom: 1rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      background: #10b981; /* Vert moderne et dynamique */
      color: white;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      width: 100%;
      padding: 1rem 2rem;
      border: none;
      border-radius: 0.75rem;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.25);
      transition: all 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(16, 185, 129, 0.35);
      background: #059669; /* Vert légèrement plus foncé au survol */
    }

    .cta:active {
      transform: translateY(0);
    }

    .cta svg {
      width: 1.25rem;
      height: 1.25rem;
    }

    .ingredients-block {
      text-align: left;
      width: 100%;
      margin-top: 1.5rem;
      padding: 1.5rem;
      background: #f8fafc;
      border-radius: 1rem;
      border: 1px solid #e2e8f0;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .ingredients-block h2 {
      font-size: 1.1rem;
      color: #0f172a;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .rayon-title {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #64748b;
      font-weight: 600;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
      padding-bottom: 0.25rem;
      border-bottom: 1px solid #e2e8f0;
    }

    .ingredients-block ul {
      list-style: none;
      padding: 0;
      margin: 0 0 1rem 0;
    }

    .ingredients-block li {
      padding: 0.35rem 0;
      color: #334155;
      font-size: 0.95rem;
      display: flex;
      justify-content: space-between;
    }

    .ingredients-block li span.quantite {
      font-weight: 600;
      color: #10b981;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <main>
    <h1 class="logo">🔗 LinkToCart</h1>
    <p class="tagline">Collez une recette en vrac, l'IA génère votre liste de courses triée par rayon.</p>

    <textarea
      class="recette-input"
      id="recette-input"
      placeholder="Collez ici le texte de la recette ou les ingrédients..."
      aria-label="Zone de texte pour coller une recette"
    ></textarea>

    <div class="cta-wrap">
      <button type="button" class="cta" id="btn-analyze" aria-label="Générer la liste">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h4M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z" />
        </svg>
        <span>Créer ma liste de courses</span>
      </button>
    </div>

    <!-- Zone de résultat stylisée -->
    <div class="ingredients-block hidden" id="ingredients-block">
      <h2>🛒 Votre Panier</h2>
      <div id="ingredients-content"></div>
    </div>
  </main>

  <script>
    const button = document.getElementById('btn-analyze'); 
    const textarea = document.getElementById('recette-input');
    const resultBlock = document.getElementById('ingredients-block');
    const resultContent = document.getElementById('ingredients-content');
    const buttonText = button.querySelector('span');

    button.addEventListener('click', async () => {
        const text = textarea.value.trim();
        if (!text) {
            alert("Veuillez coller le texte d'une recette d'abord !");
            return;
        }

        // État de chargement
        buttonText.textContent = "Magie en cours...";
        button.style.opacity = "0.7";
        button.style.cursor = "wait";
        resultBlock.classList.add('hidden');
        resultContent.innerHTML = "";

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ recipe: text })
            });

            if (!response.ok) throw new Error("Erreur serveur");

            const data = await response.json();
            
            // Regrouper les ingrédients par rayon
            const rayons = {};
            data.ingredients.forEach(ing => {
                const rayon = ing.rayon || "Autre";
                if (!rayons[rayon]) rayons[rayon] = [];
                rayons[rayon].push(ing);
            });

            // Construire l'affichage par rayon
            let html = "";
            for (const [rayon, items] of Object.entries(rayons)) {
                html += `<div class="rayon-title">${rayon}</div><ul>`;
                items.forEach(ing => {
                    html += `<li>
                                <span>${ing.item}</span>
                                <span class="quantite">${ing.quantite} ${ing.unite || ''}</span>
                             </li>`;
                });
                html += `</ul>`;
            }
            
            // Afficher le résultat
            resultContent.innerHTML = html;
            resultBlock.classList.remove('hidden');
            
            // Réinitialiser le bouton
            buttonText.textContent = "Générer une autre liste";
            button.style.opacity = "1";
            button.style.cursor = "pointer";

        } catch (error) {
            console.error(error);
            resultBlock.classList.remove('hidden');
            resultContent.innerHTML = "<p style='color: #ef4444;'>❌ Oups ! Impossible de contacter l'IA. Réessayez.</p>";
            buttonText.textContent = "Créer ma liste de courses";
            button.style.opacity = "1";
            button.style.cursor = "pointer";
        }
    });
  </script>
</body>
</html>
